services:
  headroom-proxy:
    build: .
    command: ["--host", "0.0.0.0"]
    environment:
      - HEADROOM_HOST=0.0.0.0
      - HEADROOM_TELEMETRY=off
      - HEADROOM_LOCAL_CONTROL_GUARD_ENABLED=true
      # if you want to use a custom OpenAI-compatible API endpoint,
      # uncomment and set the following line with the desired URL
      # - OPENAI_TARGET_API_URL=https://api.x.ai
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - qdrant
      - neo4j

  # Vector database for semantic search
  qdrant:
    image: qdrant/qdrant:v1.17.1
    expose:
      - "6333"  # REST API
      - "6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Graph database for relationships and multi-hop reasoning
  neo4j:
    image: neo4j:5.26
    # Internal-only exposure (no host port publish) + required password —
    # preserved from the local-proxy security hardening pass.
    expose:
      - "7474"  # HTTP (Browser)
      - "7687"  # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${HEADROOM_NEO4J_PASSWORD:?set HEADROOM_NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

volumes:
  qdrant_data:
  neo4j_data:
